# Nginx reverse proxy для Enguard → Next.js на 127.0.0.1:3000
# Положить в /etc/nginx/sites-available/enguard и слинковать в sites-enabled.
# HTTPS-блок (443) добавит certbot автоматически.

server {
    listen 80;
    listen [::]:80;
    server_name enguard.study www.enguard.study;

    client_max_body_size 30M; # для загрузки EPUB

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
